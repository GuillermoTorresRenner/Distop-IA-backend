name: distop_ia_prod

services:
  db:
    image: postgres:17
    container_name: ${PREFIX}_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: '${POSTGRES_USER}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      POSTGRES_DB: '${DB_NAME}'
    volumes:
      - distop_ia_prod_postgresql_data:/var/lib/postgresql/data
    networks:
      - internal
    shm_size: '128mb'
    ports:
      - '5440:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 30

  backend:
    image: lebateleur/distop-ia-back:qa
    container_name: ${PREFIX}_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${DB_NAME}?schema=public
    depends_on:
      db:
        condition: service_healthy
    networks:
      internal:
        aliases:
          - backend
          - backend-prod
    volumes:
      - ./public:/app/public
      - ./youtube-cookies.txt:/app/youtube-cookies.txt

networks:
  internal:
    name: distop_ia_prod_internal_net
    driver: bridge

volumes:
  distop_ia_prod_postgresql_data:
    name: distop_ia_prod_postgresql_data
    driver: local
