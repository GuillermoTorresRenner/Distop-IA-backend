name: distop_ia_prod

services:
  db:
    container_name: ${PREFIX}_db
    image: postgres:17
    restart: always
    ports:
      - "5439:5432"
    volumes:
      - distop_ia_prod_data:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - distop_ia_prod_network
    shm_size: '128mb'
    environment:
      POSTGRES_USER: '${POSTGRES_USER}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      POSTGRES_DB: '${DB_NAME}'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 30

  backend:
    image: lebateleur/distop-ia-back:latest
    container_name: ${PREFIX}_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${DB_NAME}?schema=public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - distop_ia_prod_network
      - web
    volumes:
      - ./public:/app/public

networks:
  distop_ia_prod_network:
    driver: bridge
    name: distop_ia_prod_internal_net
  web:
    external: true
    name: web

volumes:
  distop_ia_prod_data:
    driver: local
    name: distop_ia_prod_postgresql_data
