name: distop_ia_qa

services:
  db:
    image: postgres:17
    container_name: ${PREFIX}_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: '${POSTGRES_USER}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      POSTGRES_DB: '${DB_NAME}'
    volumes:
      - distop_ia_qa_postgresql_data:/var/lib/postgresql/data
    networks:
      - internal
    shm_size: '128mb'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 30

  backend:
    image: lebateleur/distop-ia-back:qa
    container_name: ${PREFIX}_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${DB_NAME}?schema=public
    depends_on:
      db:
        condition: service_healthy
    networks:
      internal:
        aliases:
          - backend
          - backend-qa
    volumes:
      - ./public:/app/public
      # Cookies de YouTube para bypassear bot detection desde el VPS.
      # Generarlas localmente con "Get cookies.txt LOCALLY" (Chrome) estando
      # logueado en youtube.com, y subirlas al VPS en la misma carpeta que
      # este compose. Si el archivo no existe, la música funcionará igual
      # pero YouTube puede bloquear el acceso desde IPs de datacenter.
      - ./youtube-cookies.txt:/app/youtube-cookies.txt:ro

  adminer:
    image: adminer:latest
    container_name: ${PREFIX}_adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    name: distop_ia_qa_internal_net
    driver: bridge

volumes:
  distop_ia_qa_postgresql_data:
    name: distop_ia_qa_postgresql_data
    driver: local
