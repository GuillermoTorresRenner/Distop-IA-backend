name: Deploy Production Backend to Hostinger VPS

# La imagen ya fue construida y publicada por el workflow de QA. Aquí solo
# subimos al VPS el docker-compose, hacemos `docker pull` de `:latest` y
# levantamos los servicios. Sin build, sin push.

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  PROJECT_PATH: /home/deployer/proyectos/distop-ia/prod/back
  DOCKER_IMAGE: lebateleur/distop-ia-back
  COMPOSE_PROJECT_NAME: distop_ia_prod
  # La imagen `:qa` es la única que existe en el registry; la construye el
  # workflow de QA. Prod la consume directamente: misma imagen testeada en QA.
  IMAGE_TAG: qa

jobs:
  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload compose file to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: 'docker-compose.yml'
          target: ${{ env.PROJECT_PATH }}/
          strip_components: 0
          overwrite: true
          timeout: 600s
          rm: false

      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: PROJECT_PATH,DOCKER_IMAGE,COMPOSE_PROJECT_NAME,IMAGE_TAG
          script: |
            set -e
            echo "=========================================="
            echo "Starting production backend deployment..."
            echo "=========================================="
            mkdir -p $PROJECT_PATH
            cd $PROJECT_PATH

            echo "Configuring environment..."
            echo "${{ secrets.PROD_ENV_VARS }}" > .env

            set -a
            source .env
            set +a
            PREFIX="${PREFIX:-distop_ia_prod}"

            mkdir -p public
            sudo chown -R 1001:1001 public || true

            echo "=========================================="
            echo "Step 1: Stopping existing containers..."
            echo "=========================================="
            docker compose --project-name "$COMPOSE_PROJECT_NAME" down --remove-orphans || echo "No containers to stop"
            for svc in db backend; do
              docker rm -f "${PREFIX}_${svc}" 2>/dev/null || true
            done

            echo "=========================================="
            echo "Step 2: Pulling Docker image (built in QA)..."
            echo "=========================================="
            for i in 1 2 3; do
              if docker pull "$DOCKER_IMAGE:$IMAGE_TAG"; then
                echo "Image pulled successfully"
                break
              else
                echo "Pull attempt $i failed, retrying in 10 seconds..."
                sleep 10
                if [ $i -eq 3 ]; then
                  echo "Failed to pull image after 3 attempts"
                  exit 1
                fi
              fi
            done

            echo "=========================================="
            echo "Step 3: Starting containers..."
            echo "=========================================="
            docker compose --project-name "$COMPOSE_PROJECT_NAME" up -d
            docker compose --project-name "$COMPOSE_PROJECT_NAME" ps

            echo "=========================================="
            echo "Step 4: Waiting for PostgreSQL to initialize..."
            echo "=========================================="
            sleep 30

            echo "=========================================="
            echo "Step 5: Running database migrations..."
            echo "=========================================="
            if ! docker compose --project-name "$COMPOSE_PROJECT_NAME" exec -T backend npx prisma migrate deploy; then
              echo "Database migration failed"
              docker logs "${PREFIX}_backend" | tail -50
              exit 1
            fi

            echo "=========================================="
            echo "Step 6: Running database seed (idempotent)..."
            echo "=========================================="
            # El seed puebla los catálogos canon V20 (arquetipos, disciplinas,
            # clanes, méritos, armas y armaduras). Es idempotente: vuelve a
            # correr sin duplicar. Sin esto, la hoja de personaje sale sin
            # catálogo.
            if ! docker compose --project-name "$COMPOSE_PROJECT_NAME" exec -T backend npm run db:seed; then
              echo "Seed failed (non-blocking)"
            fi

            echo "=========================================="
            echo "Production deployment completed successfully"
            echo "=========================================="
